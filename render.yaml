services:
  - type: web
    name: pdf-to-epub-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PDF_TO_EPUB_CORS_ORIGINS
        value: https://gloriakitchens.github.io
      - key: PDF_TO_EPUB_MAX_UPLOAD_MB
        value: "50"
      - key: PDF_TO_EPUB_JOB_TTL_SECONDS
        value: "3600"
      - key: PDF_TO_EPUB_MAX_SCALE
        value: "1.5"
      - key: PDF_TO_EPUB_MAX_PAGES
        value: "150"
      - key: PDF_TO_EPUB_MEMORY_SAMPLE_INTERVAL_SECONDS
        value: "1.0"
